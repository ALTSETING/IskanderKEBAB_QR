<!doctype html>
<html lang="uk">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>QR Menu</title>

  <link rel="stylesheet" href="styles.css" />
  <script defer src="app.js"></script>
</head>
<body>
  <div class="wrap">
    <h1>QR Menu</h1>
    
<div id="filters" class="filters">
      <button class="btn3" type="button" data-cat="">Wszystko</button>

      <button class="btn3" type="button" data-cat="Przystawki">Przystawki</button>
      <button class="btn3" type="button" data-cat="Sałatki">Sałatki</button>
      <button class="btn3" type="button" data-cat="Kebaby">Kebaby</button>
      <button class="btn3" type="button" data-cat="Dania główne">Dania główne</button>
      <button class="btn3" type="button" data-cat="Grill">Dania z grilla</button>
      <button class="btn3" type="button" data-cat="Sides">Dodatki</button>
      <button class="btn3" type="button" data-cat="Napoje zimne">Napoje zimne</button>
      <button class="btn3" type="button" data-cat="Napoje ciepłe">Napoje ciepłe</button>
      <button class="btn3" type="button" data-cat="Desery">Desery</button>
    </div>
    <div class="row mt14">
      <div class="card menu" id="menuSection">
        <h2 class="h2">Menu</h2>
        <div id="menuList" class="mini">Loading...</div>
      </div>

      <div class="card cart" id="cartSection">
        <h2 class="h2">Koszyk</h2>

        <label class="mini">Table code</label>
        <input id="tableCode" placeholder="Wpisz numer znajdujący się na kodzie QR" />

        <div id="cartList" class="mini mt10">Na razie pusto</div>
        <div class="total" id="total">Total: 0 zł</div>

        <div class="actions">
          <button class="btn2" id="clearBtn" type="button">Wyczyść</button>
          <button class="btn" id="orderBtn" type="button">Złóż zamówienie</button>
        </div>

        <div id="msg" class="mini mt12"></div>
      </div>
    </div>

    <button class="floating-cart-btn" id="floatingCartBtn" type="button" aria-live="polite">
      <span class="floating-cart-left">
        <span class="floating-cart-icon-wrap" aria-hidden="true">
          <svg class="floating-cart-icon" viewBox="0 0 64 64" fill="none">
            <path d="M20 23L27 16H37L44 23" stroke="currentColor" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round"/>
            <rect x="20" y="23" width="24" height="25" rx="3.5" stroke="currentColor" stroke-width="2.8"/>
            <path d="M27 31C27 34.9 30.1 38 34 38C37.9 38 41 34.9 41 31" stroke="currentColor" stroke-width="2.8" stroke-linecap="round"/>
          </svg>
          <span class="floating-cart-count" id="floatingCartCount">0</span>
        </span>
        <span>Zobacz koszyk</span>
      </span>
      <span class="floating-cart-price" id="floatingCartPrice">0.00 zł</span>
    </button>

    <div class="mobile-bottom-nav">
      <button class="mobile-tab active" id="tabMenu" type="button" data-tab="menu">
         <span class="mobile-tab-icon" aria-hidden="true">
          <svg class="mobile-tab-icon-svg" viewBox="0 0 64 64" fill="none">
            <path d="M17 39C17 32.925 21.925 28 28 28H36C42.075 28 47 32.925 47 39H17Z" stroke="currentColor" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M14 39H50" stroke="currentColor" stroke-width="2.8" stroke-linecap="round"/>
            <path d="M20 44H44" stroke="currentColor" stroke-width="2.8" stroke-linecap="round"/>
            <path d="M23 18C23 15.5 25 14.5 25 12" stroke="currentColor" stroke-width="2.8" stroke-linecap="round"/>
            <path d="M32 18C32 15.5 34 14.5 34 12" stroke="currentColor" stroke-width="2.8" stroke-linecap="round"/>
            <path d="M41 18C41 15.5 43 14.5 43 12" stroke="currentColor" stroke-width="2.8" stroke-linecap="round"/>
            <circle cx="29" cy="34.5" r="1.6" fill="currentColor"/>
            <circle cx="35" cy="33.2" r="1.6" fill="currentColor"/>
            <circle cx="39" cy="35.4" r="1.6" fill="currentColor"/>
          </svg>
        </span>
        <span class="mobile-tab-text">Menu</span>
      </button>

      <button class="mobile-tab" id="tabCart" type="button" data-tab="cart">
        <span class="mobile-tab-icon" aria-hidden="true">
          <svg class="mobile-tab-icon-svg" viewBox="0 0 64 64" fill="none">
            <path d="M20 23L27 16H37L44 23" stroke="currentColor" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round"/>
            <rect x="20" y="23" width="24" height="25" rx="3.5" stroke="currentColor" stroke-width="2.8"/>
            <path d="M27 31C27 34.9 30.1 38 34 38C37.9 38 41 34.9 41 31" stroke="currentColor" stroke-width="2.8" stroke-linecap="round"/>
          </svg>
        </span>
        <span class="mobile-tab-text">Koszyk</span>
      </button>
</div>
  </div>

</body>
</html>
